["fix:all"]
depends     = ["fix:*"]
description = "Run all formatters"

["fix:action"]
description = "Run fix actions files"
run         = ["pinact run", "disable-checkout-persist-credentials"]

["fix:pinact"]
description = "Run pinact (fix)"
run         = "pinact run"

["fix:toml"]
description = "Run fix TOML files"
hide        = true
run         = "taplo format"

["fix:yaml"]
description = "Run fix YAML files"
hide        = true
run         = "oxfmt '**/*.{yaml,yml}'"

["fix:json"]
description = "Run fix JSON files"
hide        = true
run         = "oxfmt '**/*.json'"

["fix:md"]
description = "Run fix Markdown files"
hide        = true
run         = "oxfmt '**/*.md'"
