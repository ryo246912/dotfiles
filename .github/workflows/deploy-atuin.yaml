name: deploy-atuin
on:
  push:
    branches:
      - main
    paths:
      # Fly.io deploy input only; client config changes should not trigger deploys.
      - dot_config/atuin/fly.toml

permissions: {}

concurrency:
  group: deploy-atuin-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Atuin to Fly.io
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1
        with:
          version: "0.4.29"
      - name: Deploy Atuin
        run: flyctl deploy --app ryo-shellhistory -c dot_config/atuin/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
