name: test-mac

# `/test-mac` コメント、または Actions UI からの workflow_dispatch で発火し、
# 初回インストール相当（macOS 側）が通るかを確認する。
# プリインストール済み Homebrew formula を全削除してから bootstrap.packages(brew) を実際に
# 導入し、silicon 起動まで確認する（プリインスト brew との link 衝突＝実機の痛点を再現・検証する。
# public repo なので mac ランナーは無料・分数無制限）。
# GitHub 認証に依存する処理（aqua/github backend の DL 等）は置かない（未認証 rate limit を避け、
# かつ PR コードにトークンを晒さないため）。
# セキュリティ: PR のコードを実行する test ジョブは read-only 権限に絞り、write トークンを
# PR コードに晒さない。結果コメントの write 権限は PR コードを実行しない comment ジョブに限定する。
on:
  issue_comment:
    types:
      - created
  workflow_dispatch: {}

permissions: {}

concurrency:
  group: test-mac-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    # workflow_dispatch は常に許可（Actions 実行権限で既にアクセス制御されているため）。
    # issue_comment は PR への `/test-mac`（完全一致 or `/test-mac <args>`）コメントのみ、
    # 権限のあるユーザーに限定する。
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.issue.pull_request &&
      (github.event.comment.body == '/test-mac' || startsWith(github.event.comment.body, '/test-mac ')) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    # public repo なので macOS ランナーは無料・分数無制限。
    runs-on: macos-latest
    # PR のコードを実行するため read-only 権限に絞る（write トークンを PR コードに晒さない）。
    permissions:
      contents: read
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.7.0"
          install: false

      - name: Deploy dotfiles mise config (mac env)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/mise"
          cp dot_config/mise/config.toml "$HOME/.config/mise/config.toml"
          cp dot_config/mise/config.mac.toml "$HOME/.config/mise/config.mac.toml"

      - name: Clear preinstalled Homebrew formulae（mise brew の link 衝突回避）
        run: |
          set -euo pipefail
          # ランナーのプリインスト formula が ca-certificates 等を所有していると mise brew が
          # link できない（実機で踏んだ cannot link と同じ）。formula を全削除して /opt/homebrew を空にする。
          brew list --formula -1 | while read -r f; do
            brew uninstall --force --ignore-dependencies "$f" || echo "warn: failed to uninstall $f"
          done
          brew autoremove || true
          rm -rf /opt/homebrew/etc/openssl@3 /opt/homebrew/etc/ca-certificates || true
          # clean 前提の検証: formula が残ると mise の link 経路を検証できないため fail させる
          # （|| true で失敗を握り潰し、汚れた prefix のまま bootstrap が通るのを防ぐ）。
          remaining=$(brew list --formula -1 | wc -l | tr -d ' ')
          if [ "$remaining" != "0" ]; then
            echo "error: cleanup 後も ${remaining} 個の formula が残存（clean 前提を満たせず）:"
            brew list --formula
            exit 1
          fi
          echo "OK: Homebrew prefix cleared"

      - name: Bootstrap packages (brew) と silicon 起動確認
        # repo root の mise.toml(開発用) を読まないよう cwd を空ディレクトリにして global config だけ効かせる。
        working-directory: ${{ runner.temp }}
        env:
          MISE_ENV: mac
          MISE_YES: "1"
        run: |
          set -euo pipefail
          mise --version
          mise bootstrap packages apply --yes
          echo "=== assert mac formulae binaries ==="
          rc=0
          for b in tig colordiff silicon gpg; do
            if [ -x "/opt/homebrew/bin/$b" ]; then
              echo "OK: $b"
            else
              echo "MISSING: $b"
              rc=1
            fi
          done
          # silicon は harfbuzz 等を要するため、実際に起動できるかまで確認（実機の痛点）。
          /opt/homebrew/bin/silicon --version || rc=1
          exit "$rc"

  comment:
    # PR コードを一切実行しない信頼ジョブ。ここだけ write 権限でコメントする。
    needs: test
    if: ${{ always() && github.event_name == 'issue_comment' && needs.test.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.issue.number }}
      REPO: ${{ github.repository }}
      RESULT: ${{ needs.test.result }}
    steps:
      - name: Comment result
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }}"
          icon() { case "$1" in success) echo "✅";; skipped) echo "⏭️";; *) echo "❌";; esac; }
          body=$(printf '`/test-mac`（config+brew bootstrap+silicon、[log](%s)）: %s %s' \
            "$run_url" "$(icon "$RESULT")" "$RESULT")
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
