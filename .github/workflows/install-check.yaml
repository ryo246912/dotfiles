name: install-check

# PR に `/test` コメントで発火し、初回インストール相当（config 検証 + bootstrap.packages
# の apt 導入）が通るかを Linux で確認する。GitHub 認証に依存しないよう apt bootstrap に絞る
# （mise install の [tools] は本 PR の変更対象外。GitHub API を叩く aqua スモークは
# 未認証 rate limit で不安定になるため設けない）。
# セキュリティ: PR のコードを実行する test ジョブは read-only 権限かつトークン無しに絞り、
# write 権限トークンは PR コードを実行しない comment ジョブだけに与える。
on:
  issue_comment:
    types:
      - created

permissions: {}

concurrency:
  group: install-check-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  test:
    # PR への `/test`（完全一致 or `/test <args>`）コメントのみ。権限のあるユーザーに限定する。
    if: >-
      github.event.issue.pull_request &&
      (github.event.comment.body == '/test' || startsWith(github.event.comment.body, '/test ')) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    # PR のコードを実行するため read-only に絞る（write token を渡さない）。
    permissions:
      contents: read
    timeout-minutes: 20
    # PR コードに GITHUB_TOKEN を一切渡さない（read-only でも漏洩・private 開示の恐れがあるため）。
    # aqua の DL は1ツールのみで未認証の rate limit で足りる。write トークンは comment ジョブだけが持つ。
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          persist-credentials: false

      - name: Validate configs
        run: |
          set -euo pipefail
          for f in \
            dot_config/mise/config.toml \
            dot_config/mise/config.mac.toml \
            dot_config/mise/config.windows.toml \
            .chezmoi.toml.tmpl; do
            python3 -c "import tomllib; tomllib.load(open('$f','rb'))" && echo "OK toml: $f"
          done
          # post-apply hook の bash 構文チェック
          python3 -c "import tomllib; print(tomllib.load(open('.chezmoi.toml.tmpl','rb'))['hooks']['apply']['post']['args'][1])" > "$RUNNER_TEMP/hook.sh"
          bash -n "$RUNNER_TEMP/hook.sh" && echo "OK: hook bash syntax"
          # 初回インストーラ（WSL）の構文チェック
          bash -n run_once_install-packages_windows.sh && echo "OK: run_once windows syntax"

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: "2026.7.0"
          install: false

      - name: Deploy dotfiles mise config (windows/apt env)
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.config/mise"
          cp dot_config/mise/config.toml "$HOME/.config/mise/config.toml"
          cp dot_config/mise/config.windows.toml "$HOME/.config/mise/config.windows.toml"

      - name: Bootstrap packages (apt) と導入確認
        # repo root の mise.toml(開発用) を読まないよう、cwd を空ディレクトリにして global config だけ効かせる。
        working-directory: ${{ runner.temp }}
        env:
          MISE_ENV: windows
          MISE_YES: "1"
        run: |
          set -euo pipefail
          mise --version
          mise bootstrap packages apply --yes
          echo "=== assert migrated apt packages ==="
          rc=0
          for pkg in tig colordiff tree ffmpeg goaccess ugrep; do
            if command -v "$pkg" >/dev/null 2>&1; then
              echo "OK: $pkg"
            else
              echo "MISSING: $pkg"
              rc=1
            fi
          done
          exit "$rc"

  comment:
    # PR コードを一切実行しない信頼ジョブ。ここだけ write 権限でコメントする。
    needs: test
    if: ${{ always() && needs.test.result != 'skipped' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      PR_NUMBER: ${{ github.event.issue.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Comment result
        run: |
          set -euo pipefail
          run_url="${{ github.server_url }}/${REPO}/actions/runs/${{ github.run_id }}"
          if [ "${{ needs.test.result }}" = "success" ]; then
            body="✅ \`/test\` install-check passed: config 検証 + apt bootstrap(tig/colordiff 等) が通りました（[log](${run_url})）"
          else
            body="❌ \`/test\` install-check failed: [Actions のログ](${run_url}) を確認してください"
          fi
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$body"
