name: lint
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: ${{ ! endsWith(github.actor, '[bot]')}}
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: read
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files_yaml: |
            json:
              - "**/*.json"
            yaml:
              - "**/*.yaml"
              - "**/*.yml"
            md:
              - "**/*.md"
            toml:
              - "**/*.toml"
            actions:
              - ".github/workflows/*"
            secret:
              - "**/*"

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install_args: "aqua:rhysd/actionlint aqua:secretlint/secretlint aqua:suzuki-shunsuke/ghalint aqua:suzuki-shunsuke/pinact aqua:tamasfe/taplo aqua:zizmorcore/zizmor npm:oxfmt"
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s

      - name: oxfmt (json)
        id: lint-json
        if: steps.changed-files.outputs.json_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:json

      - name: oxfmt (yaml)
        id: lint-yaml
        if: steps.changed-files.outputs.yaml_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:yaml

      - name: oxfmt (markdown)
        id: lint-md
        if: steps.changed-files.outputs.md_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:md

      - name: taplo (toml)
        id: lint-toml
        if: steps.changed-files.outputs.toml_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:toml

      - name: actionlint
        id: lint-actionlint
        if: steps.changed-files.outputs.actions_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:actionlint

      - name: ghalint
        id: lint-ghalint
        if: steps.changed-files.outputs.actions_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:ghalint
        env:
          GHALINT_LOG_COLOR: always

      - name: zizmor
        id: lint-zizmor
        if: steps.changed-files.outputs.actions_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:zizmor
        env:
          GH_TOKEN: ${{ github.token }}

      - name: pinact
        id: lint-pinact
        if: steps.changed-files.outputs.actions_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:pinact

      - name: secretlint
        id: lint-secret
        if: steps.changed-files.outputs.secret_any_changed == 'true'
        background: true # actionlint:ignore
        run: mise run lint:secret

      - name: wait for all lints
        wait: # actionlint:ignore
          - lint-json
          - lint-yaml
          - lint-md
          - lint-toml
          - lint-actionlint
          - lint-ghalint
          - lint-zizmor
          - lint-pinact
          - lint-secret
