name: lint
on:
  push:
    branches:
      - main
    paths:
      - "**.yaml"
      - "**.yml"
      - "**.toml"
      - "**.json"
  pull_request:
    branches:
      - main
    paths:
      - "**.yaml"
      - "**.yml"
      - "**.toml"
      - "**.json"

permissions: {}

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    if: ${{ ! endsWith(github.actor, '[bot]')}}
    runs-on: ubuntu-slim
    permissions:
      contents: read # To checkout the repository
      pull-requests: read # To identify changed files in PRs
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files_yaml: |
            json:
              - "**/*.json"
            yaml:
              - "**/*.yaml"
              - "**/*.yml"
            toml:
              - "**/*.toml"

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install_args: "npm:prettier npm:@taplo/cli"
        env:
          MISE_FETCH_REMOTE_VERSIONS_TIMEOUT: 30s

      - name: lint json
        if: steps.changed-files.outputs.json_any_changed == 'true'
        run: npx prettier --check ${{ steps.changed-files.outputs.json_all_changed_files }}

      - name: lint yaml
        if: always() && steps.changed-files.outputs.yaml_any_changed == 'true'
        run: npx prettier --check ${{ steps.changed-files.outputs.yaml_all_changed_files }}

      - name: lint toml
        if: always() && steps.changed-files.outputs.toml_any_changed == 'true'
        run: npx taplo format --check ${{ steps.changed-files.outputs.toml_all_changed_files }}
