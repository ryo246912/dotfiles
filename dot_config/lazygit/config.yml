customCommands:
  - command: czg
    context: "files, worktrees, localBranches, remotes, tags"
    output: terminal
    key: c
  - command: gitui
    context: "files"
    output: terminal
    key: u
  - command: chezmoi apply --interactive --exclude=scripts,templates
    context: "files, worktrees, localBranches, remotes, tags"
    output: terminal
    key: C
  - command: gh-dash
    context: "files, worktrees, localBranches, remotes, tags"
    output: terminal
    key: x
  - command: yazi
    context: "files, worktrees, localBranches, remotes, tags"
    output: terminal
    key: Y
  - command: $SHELL || zsh || bash
    context: "files, worktrees, localBranches, remotes, tags, commits"
    output: terminal
    key: t
    description: "Open temporary terminal"
  - command: "git commit --fixup {{.SelectedLocalCommit.Hash}} && git -c sequence.editor=true rebase -i --autostash --autosquash --quiet {{.SelectedLocalCommit.Hash}}~1"
    key: F
    context: commits
    description: "Fixup and Auto-squash into selected commit"
  - command: >
      git checkout -b {{.Form.newBranchName}} {{or .SelectedLocalBranch.Name .SelectedRemoteBranch.Name .SelectedTag.Name}} &&
      git config "branch.$(git symbolic-ref --short HEAD).base-branch" {{or .SelectedLocalBranch.Name .SelectedRemoteBranch.Name .SelectedTag.Name}}
    key: n
    context: "localBranches, remotes, tags"
    prompts:
      - type: "input"
        title: "Enter new branch name"
        key: "newBranchName"
    loadingText: "Creating branch and setting config..."
    description: "Create new branch with base-branch config"
  - command: >-
      bash -c '
      target="$1";
      current="$2";
      wt=$(git worktree list --porcelain | awk -v b="refs/heads/$target" "/^worktree /{p=\$2} /^branch /{if(\$2==b) print p}");
      if [ -n "$wt" ]; then
        git -C "$wt" merge "$current";
      else
        git checkout "$target" && git merge "$current" && git checkout "$current";
      fi' --
      {{ .SelectedLocalBranch.Name | quote }}
      {{ .CheckedOutBranch.Name | quote }}
    key: m
    context: localBranches
    prompts:
      - type: "confirm"
        title: "Merge branch"
        body: "merge {{.CheckedOutBranch.Name}} to {{.SelectedLocalBranch.Name}}?"
    description: "Merge current branch into selected branch"
    loadingText: "Merging..."
promptToReturnFromSubprocess: false
gui:
  language: "ja"
  showIcons: true
  splitDiff: "always"
git:
  pagers:
    - colorArg: always
      pager: delta --paging=never --no-gitconfig

os:
  editCommand: 'nvim'
