# fly.toml app configuration file for AgentsView PostgreSQL Sync.
# See https://fly.io/docs/reference/configuration/

app            = "ryo-agentsview"
primary_region = "nrt"

kill_signal  = "SIGINT"
kill_timeout = "5s"

[build]
dockerfile = "dot_config/agentsview/Dockerfile"

[env]
AGENTSVIEW_DATA_DIR             = "/data"
AGENTSVIEW_DISABLE_UPDATE_CHECK = "1"
AGENTSVIEW_PG_SCHEMA            = "agentsview"
AGENTSVIEW_PUBLIC_URL           = "https://ryo-agentsview.fly.dev"

[mounts]
destination         = "/data"
initial_size        = "1GB"
scheduled_snapshots = true
source              = "agentsview_data"

[http_service]
auto_start_machines  = true
auto_stop_machines   = "stop"
force_https          = true
internal_port        = 8080
min_machines_running = 0
processes            = ["app"]

[http_service.http_options.response.headers]
"Referrer-Policy"           = "no-referrer"
"Strict-Transport-Security" = "max-age=31536000; includeSubDomains"
"X-Content-Type-Options"    = "nosniff"
"X-Frame-Options"           = "DENY"

[http_service.tls_options]
versions = ["TLSv1.2", "TLSv1.3"]

[checks]
[checks.agentsview_health]
grace_period = "30s"
method       = "GET"
path         = "/"
port         = 8080
timeout      = "5s"
type         = "http"

[[vm]]
cpu_kind  = "shared"
cpus      = 1
memory_mb = 256
