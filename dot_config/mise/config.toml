[settings]
auto_install = false
experimental = true
gpg_verify = true
lockfile = true
trusted_config_paths = [
    "~/.local/share/chezmoi",
    "~/.local/share/worktrees",
]

[task_config]
includes = ["tasks/*.toml"]

[settings.npm]
bun = true

[settings.pipx]
uvx = true

[hooks]
enter = """
[ "$(git rev-parse --is-inside-work-tree 2>/dev/null)" = "true" ] || exit 0
lefthook install
"""
