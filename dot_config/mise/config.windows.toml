[tools]
# silicon は Linux では aqua の linux asset で導入する（v0.5.3 は asset 不完全のため 0.5.2 固定）。
# mac は aqua darwin binary が /usr/local(Intel brew) の harfbuzz に動的リンクし arm64 で
# 起動できないため、config.mac.toml の brew:silicon(native) を使う。
"aqua:Aloxaf/silicon" = "0.5.2"

# WSL(Windows) 専用の CLI パッケージ（apt で導入）。
# mise の brew マネージャは Linux でも linuxbrew として動くため、brew: を base に置くと
# 二重導入になる。よって apt: はこの WSL 専用 config に隔離する
# （host-env で os=windows のとき本ファイルが読まれる。mac では読まれない）。
# 適用は手動（setup.md の `mise bootstrap packages apply`）。post-apply フックの自動適用は
# sudo 不要な macOS のみで、WSL の apt(要 sudo) は非対話フックでは実行しない。
#   ※ git / gnupg は gpg_verify とブートストラップの都合で早期の run_once(apt) で導入する
#     （run_once_install-packages_windows.sh 参照）ため、ここには含めない。
[bootstrap.packages]
"apt:tig"       = "latest"
"apt:colordiff" = "latest"
"apt:tree"      = "latest"
"apt:ffmpeg"    = "latest"
"apt:goaccess"  = "latest"
"apt:ugrep"     = "latest"
