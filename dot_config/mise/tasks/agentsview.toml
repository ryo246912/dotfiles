need() {
  if [[ -z ${!1-} ]]; then
    read -rsp "$1: " "$1"; echo
  fi
  [[ -n ${!1-} ]] || { echo "Set $1" >&2; exit 1; }
  export "$1"
}

need AGENTSVIEW_OWNER_PROXY_PG_URL

proxy_port="${AGENTSVIEW_PG_PROXY_PORT:-15432}"
proxy_app="${AGENTSVIEW_PG_APP:-psgl}"
proxy_log="$(mktemp)"

cleanup() {
  if [ -n "${proxy_pid:-}" ]; then
    kill "$proxy_pid" 2>/dev/null || true
    wait "$proxy_pid" 2>/dev/null || true
  fi
  rm -f "$proxy_log"
}

if nc -z 127.0.0.1 "$proxy_port" >/dev/null 2>&1; then
  echo "127.0.0.1:${proxy_port} is already in use" >&2
  exit 1
fi

flyctl proxy "${proxy_port}:5432" -a "$proxy_app" >"$proxy_log" 2>&1 &
proxy_pid=$!

trap cleanup EXIT
trap 'exit 130' INT
trap 'exit 143' TERM

i=0
while ! nc -z 127.0.0.1 "$proxy_port" >/dev/null 2>&1; do
  if ! kill -0 "$proxy_pid" 2>/dev/null; then
    cat "$proxy_log" >&2
    exit 1
  fi
  i=$((i + 1))
  if [ "$i" -ge 40 ]; then
    cat "$proxy_log" >&2
    echo "Timed out waiting for flyctl proxy on 127.0.0.1:${proxy_port}" >&2
    exit 1
  fi
  sleep 0.25
done

export AGENTSVIEW_PG_URL="$AGENTSVIEW_OWNER_PROXY_PG_URL"
export AGENTSVIEW_PG_MACHINE="${AGENTSVIEW_PG_MACHINE:-$(hostname)}"

if [ -n "${AGENTSVIEW_MIGRATION_PROJECTS:-}" ]; then
  agentsview pg push --projects "$AGENTSVIEW_MIGRATION_PROJECTS"
else
  agentsview pg push
fi
'''

["agentsview:fly:tokens"]
description = "Generate AgentsView auth_token and cursor_secret values for secret manager storage"
run = '''
set -eu

printf 'AGENTSVIEW_AUTH_TOKEN=%s\n' "$(openssl rand -base64 32)"
printf 'AGENTSVIEW_CURSOR_SECRET=%s\n' "$(openssl rand -base64 32)"
'''

["agentsview:fly:secrets"]
description = "Set Fly secrets for the public AgentsView viewer with a read-only PostgreSQL role"
# 未設定 env をその場で伏せ字入力できるよう、bash + 端末直結で実行する。
shell = "bash -c"
interactive = true
run = '''
set -eu

# 必須の環境変数が未設定なら、その場で（入力を伏せて）尋ねる。
# task は shell="bash -c" / interactive=true で stdin が端末に直結するため、
# read -s で受け取れる。値が無いまま（非 TTY の CI 等）なら "Set <VAR>" で停止。
need() {
  if [[ -z ${!1-} ]]; then
    read -rsp "$1: " "$1"; echo
  fi
  [[ -n ${!1-} ]] || { echo "Set $1" >&2; exit 1; }
  export "$1"
}

need AGENTSVIEW_READ_PG_URL
need AGENTSVIEW_AUTH_TOKEN
need AGENTSVIEW_CURSOR_SECRET

CONFIG_B64=$(
  printf 'public_url = "https://ryo-agentsview.fly.dev"\nrequire_auth = true\nauth_token = "%s"\ncursor_secret = "%s"\n\n[pg]\nallow_insecure = true\n' "$AGENTSVIEW_AUTH_TOKEN" "$AGENTSVIEW_CURSOR_SECRET" \
  | base64 | tr -d '\n'
)

# secret 値を argv（process table）に出さないよう、stdin 経由の import を使う。
# import は各行を最初の '=' で KEY/VALUE に分割するため、値に含まれる '='
# （URL の query や base64 の padding）はそのまま値として保持される。
printf 'AGENTSVIEW_PG_URL=%s\nAGENTSVIEW_CONFIG_TOML=%s\n' \
  "$AGENTSVIEW_READ_PG_URL" "$CONFIG_B64" \
  | flyctl secrets import -a ryo-agentsview
'''

["agentsview:deploy"]
description = "Deploy the AgentsView public viewer to Fly.io"
run         = "flyctl deploy --app ryo-agentsview -c dot_config/agentsview/fly.toml"

