["agentsview:setup:db-roles"]
description = "Create/update AgentsView PostgreSQL roles for owner, local push, and read-only viewer"
run = '''
set -eu

# 必須の環境変数が未設定なら、TTY があればその場で（入力を伏せて）尋ねる。
# TTY が無い（CI 等）場合は従来どおり "Set <VAR>" でエラー停止する。
need() {
  eval "_v=\${$1:-}"
  [ -n "$_v" ] && return 0
  # test -r は権限ビットしか見ず、制御端末が無くても真になる。exec は dash で
  # リダイレクト失敗が致命的になるため、subshell で実際に open できるか判定する。
  if (: </dev/tty) 2>/dev/null; then
    printf '%s: ' "$1" >/dev/tty
    stty -echo </dev/tty 2>/dev/null || true
    read -r _v </dev/tty || true
    stty echo </dev/tty 2>/dev/null || true
    printf '\n' >/dev/tty
  fi
  [ -n "$_v" ] || { echo "Set $1" >&2; exit 1; }
  eval "export $1=\$_v"
}

need AGENTSVIEW_ADMIN_PG_PASSWORD
need AGENTSVIEW_OWNER_PASSWORD
need AGENTSVIEW_PUSH_PASSWORD
need AGENTSVIEW_READ_PASSWORD

pg_app="${AGENTSVIEW_PG_APP:-psgl}"
pg_user="${AGENTSVIEW_ADMIN_PG_USER:-postgres}"
pg_db="${AGENTSVIEW_ADMIN_PG_DATABASE:-ryo_shellhistory}"

sql_escape() {
  printf "%s" "$1" | sed "s/'/''/g"
}

owner_pass=$(sql_escape "$AGENTSVIEW_OWNER_PASSWORD")
push_pass=$(sql_escape "$AGENTSVIEW_PUSH_PASSWORD")
read_pass=$(sql_escape "$AGENTSVIEW_READ_PASSWORD")

flyctl postgres connect -a "$pg_app" -u "$pg_user" -p "$AGENTSVIEW_ADMIN_PG_PASSWORD" -d "$pg_db" <<SQL
DO \$\$
BEGIN
  IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'agentsview_owner') THEN
    CREATE ROLE agentsview_owner LOGIN PASSWORD '$owner_pass';
  ELSE
    ALTER ROLE agentsview_owner LOGIN PASSWORD '$owner_pass';
  END IF;

  IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'agentsview_push_mac') THEN
    CREATE ROLE agentsview_push_mac LOGIN PASSWORD '$push_pass';
  ELSE
    ALTER ROLE agentsview_push_mac LOGIN PASSWORD '$push_pass';
  END IF;

  IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'agentsview_read') THEN
    CREATE ROLE agentsview_read LOGIN PASSWORD '$read_pass';
  ELSE
    ALTER ROLE agentsview_read LOGIN PASSWORD '$read_pass';
  END IF;
END
\$\$;

CREATE SCHEMA IF NOT EXISTS agentsview AUTHORIZATION agentsview_owner;
ALTER SCHEMA agentsview OWNER TO agentsview_owner;

GRANT USAGE ON SCHEMA agentsview TO agentsview_read;
GRANT USAGE ON SCHEMA agentsview TO agentsview_push_mac;

GRANT SELECT ON ALL TABLES IN SCHEMA agentsview TO agentsview_read;
GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA agentsview TO agentsview_push_mac;
GRANT USAGE, SELECT, UPDATE ON ALL SEQUENCES IN SCHEMA agentsview TO agentsview_push_mac;

ALTER DEFAULT PRIVILEGES FOR ROLE agentsview_owner IN SCHEMA agentsview
  GRANT SELECT ON TABLES TO agentsview_read;
ALTER DEFAULT PRIVILEGES FOR ROLE agentsview_owner IN SCHEMA agentsview
  GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO agentsview_push_mac;
ALTER DEFAULT PRIVILEGES FOR ROLE agentsview_owner IN SCHEMA agentsview
  GRANT USAGE, SELECT, UPDATE ON SEQUENCES TO agentsview_push_mac;
SQL
'''

["agentsview:setup:migrate"]
description = "Start flyctl proxy, run initial AgentsView schema migration with the owner PostgreSQL role, then stop proxy"
run = '''
set -eu

# 必須の環境変数が未設定なら、TTY があればその場で（入力を伏せて）尋ねる。
# TTY が無い（CI 等）場合は従来どおり "Set <VAR>" でエラー停止する。
need() {
  eval "_v=\${$1:-}"
  [ -n "$_v" ] && return 0
  # test -r は権限ビットしか見ず、制御端末が無くても真になる。exec は dash で
  # リダイレクト失敗が致命的になるため、subshell で実際に open できるか判定する。
  if (: </dev/tty) 2>/dev/null; then
    printf '%s: ' "$1" >/dev/tty
    stty -echo </dev/tty 2>/dev/null || true
    read -r _v </dev/tty || true
    stty echo </dev/tty 2>/dev/null || true
    printf '\n' >/dev/tty
  fi
  [ -n "$_v" ] || { echo "Set $1" >&2; exit 1; }
  eval "export $1=\$_v"
}

need AGENTSVIEW_OWNER_PROXY_PG_URL

proxy_port="${AGENTSVIEW_PG_PROXY_PORT:-15432}"
proxy_app="${AGENTSVIEW_PG_APP:-psgl}"
proxy_log="$(mktemp)"

cleanup() {
  if [ -n "${proxy_pid:-}" ]; then
    kill "$proxy_pid" 2>/dev/null || true
    wait "$proxy_pid" 2>/dev/null || true
  fi
  rm -f "$proxy_log"
}

if nc -z 127.0.0.1 "$proxy_port" >/dev/null 2>&1; then
  echo "127.0.0.1:${proxy_port} is already in use" >&2
  exit 1
fi

flyctl proxy "${proxy_port}:5432" -a "$proxy_app" >"$proxy_log" 2>&1 &
proxy_pid=$!

trap cleanup EXIT
trap 'exit 130' INT
trap 'exit 143' TERM

i=0
while ! nc -z 127.0.0.1 "$proxy_port" >/dev/null 2>&1; do
  if ! kill -0 "$proxy_pid" 2>/dev/null; then
    cat "$proxy_log" >&2
    exit 1
  fi
  i=$((i + 1))
  if [ "$i" -ge 40 ]; then
    cat "$proxy_log" >&2
    echo "Timed out waiting for flyctl proxy on 127.0.0.1:${proxy_port}" >&2
    exit 1
  fi
  sleep 0.25
done

export AGENTSVIEW_PG_URL="$AGENTSVIEW_OWNER_PROXY_PG_URL"
export AGENTSVIEW_PG_MACHINE="${AGENTSVIEW_PG_MACHINE:-$(hostname)}"

if [ -n "${AGENTSVIEW_MIGRATION_PROJECTS:-}" ]; then
  agentsview pg push --projects "$AGENTSVIEW_MIGRATION_PROJECTS"
else
  agentsview pg push
fi
'''

["agentsview:fly:tokens"]
description = "Generate AgentsView auth_token and cursor_secret values for secret manager storage"
run = '''
set -eu

printf 'AGENTSVIEW_AUTH_TOKEN=%s\n' "$(openssl rand -base64 32)"
printf 'AGENTSVIEW_CURSOR_SECRET=%s\n' "$(openssl rand -base64 32)"
'''

["agentsview:fly:secrets"]
description = "Set Fly secrets for the public AgentsView viewer with a read-only PostgreSQL role"
run = '''
set -eu

# 必須の環境変数が未設定なら、TTY があればその場で（入力を伏せて）尋ねる。
# TTY が無い（CI 等）場合は従来どおり "Set <VAR>" でエラー停止する。
need() {
  eval "_v=\${$1:-}"
  [ -n "$_v" ] && return 0
  # test -r は権限ビットしか見ず、制御端末が無くても真になる。exec は dash で
  # リダイレクト失敗が致命的になるため、subshell で実際に open できるか判定する。
  if (: </dev/tty) 2>/dev/null; then
    printf '%s: ' "$1" >/dev/tty
    stty -echo </dev/tty 2>/dev/null || true
    read -r _v </dev/tty || true
    stty echo </dev/tty 2>/dev/null || true
    printf '\n' >/dev/tty
  fi
  [ -n "$_v" ] || { echo "Set $1" >&2; exit 1; }
  eval "export $1=\$_v"
}

need AGENTSVIEW_READ_PG_URL
need AGENTSVIEW_AUTH_TOKEN
need AGENTSVIEW_CURSOR_SECRET

CONFIG_B64=$(
  printf 'public_url = "https://ryo-agentsview.fly.dev"\nrequire_auth = true\nauth_token = "%s"\ncursor_secret = "%s"\n\n[pg]\nallow_insecure = true\n' "$AGENTSVIEW_AUTH_TOKEN" "$AGENTSVIEW_CURSOR_SECRET" \
  | base64 | tr -d '\n'
)

flyctl secrets set -a ryo-agentsview \
  AGENTSVIEW_PG_URL="$AGENTSVIEW_READ_PG_URL" \
  AGENTSVIEW_CONFIG_TOML="$CONFIG_B64"
'''

["agentsview:deploy"]
description = "Deploy the AgentsView public viewer to Fly.io"
run         = "flyctl deploy --app ryo-agentsview -c dot_config/agentsview/fly.toml"

