root_dirs = ["~/private", "~/work"]

# Maximum directory depth for repo discovery
scan_depth = 2

pinned_repos = [""]

excluded_repos = [""]

[watch]
debounce_ms     = 500
poll_fetch_secs = 30
poll_local_secs = 5

[ui]
frame_rate = 10
# Update notification position ("top-right" or "top-left")
update_position = "top-right"

[graph]
# Branch filter: "all", "local", "remote", or "none"
branches = "all"
# Max length for branch/tag labels
label_max_len = 24
# Show +N/-M diff stats per commit
show_stats = true
