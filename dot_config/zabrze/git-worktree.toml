[[snippets]]
name    = "wtp"
snippet = "wtp"
trigger = "gw"

[[snippets]]
name    = "wtp add"
snippet = "wtp add"
trigger = "gwa"

[[snippets]]
name    = "wtp add (new branch)"
snippet = "wtp add -b"
trigger = "gwab"

[[snippets]]
name    = "wtp add (interactive/fzf)"
snippet = "fwtp"
trigger = "gwai"

[[snippets]]
name    = "wtp cd"
snippet = "wtp cd"
trigger = "gwc"

[[snippets]]
name    = "wtp remove"
snippet = "wtp remove"
trigger = "gwd"

[[snippets]]
name    = "wtp remove --with-branch"
snippet = "wtp remove --with-branch"
trigger = "gwdb"

[[snippets]]
cursor  = "👇"
name    = "wtp exec"
snippet = "wtp exec 👇 --"
trigger = "gwe"

[[snippets]]
name    = "wtp list"
snippet = "wtp list"
trigger = "gwl"

[[snippets]]
name    = "git worktree sync"
snippet = "git -C \"$(git worktree list --porcelain | head -n 1 | sed -e 's/^worktree //')\" checkout --detach \"$(git rev-parse HEAD)\""
trigger = "gws"

[[snippets]]
name    = "git worktree sync all"
snippet = "MAIN_WORKTREE_DIR=\"$(git worktree list --porcelain | head -n 1 | sed -e 's/^worktree //')\" && git -C \"$MAIN_WORKTREE_DIR\" checkout --detach \"$(git rev-parse HEAD)\" && rsync -a --exclude '.git' \"$PWD/\" \"$MAIN_WORKTREE_DIR/\""
trigger = "gwsa"

[[snippets]]
name    = "git worktree sync all(--delete)"
snippet = "MAIN_WORKTREE_DIR=\"$(git worktree list --porcelain | head -n 1 | sed -e 's/^worktree //')\" && git -C \"$MAIN_WORKTREE_DIR\" checkout --detach \"$(git rev-parse HEAD)\" && rsync -a --delete --exclude '.git' \"$PWD/\" \"$MAIN_WORKTREE_DIR/\""
trigger = "gwsad"

[[snippets]]
name            = "multi-worktree"
snippet         = "multi-worktree"
trigger-pattern = "^mw$"

[[snippets]]
name            = "multi-worktree exec"
snippet         = "multi-worktree exec"
trigger-pattern = "^mwe$"

[[snippets]]
name            = "multi-worktree list"
snippet         = "multi-worktree list"
trigger-pattern = "^mwl$"

[[snippets]]
name            = "multi-worktree remove"
snippet         = "multi-worktree remove"
trigger-pattern = "^mwr$"

[[snippets]]
name            = "multi-worktree sync"
snippet         = "multi-worktree sync"
trigger-pattern = "^mws$"
