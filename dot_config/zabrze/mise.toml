[[snippets]]
name            = "mise install"
snippet         = "GITHUB_TOKEN=$(gh auth token) mise install --jobs=2"
trigger-pattern = "^mi$"

[[snippets]]
name            = "mise install interactive"
snippet         = "{ _a=($(mise ls --current | fzf -m | awk '{print $1}')); [[ ${#_a[@]} -gt 0 ]] && GITHUB_TOKEN=$(gh auth token) mise install --jobs=2 \"${_a[@]}\"; unset _a; }"
trigger-pattern = "^mii$"

[[snippets]]
name            = "mise bootstrap packages apply"
snippet         = "MISE_ENV=$([ \"$(uname)\" = Darwin ] && echo mac || echo linux) mise bootstrap packages apply"
trigger-pattern = "^mba$"

[[snippets]]
name    = "mise ls --current"
snippet = "mise ls --current"
trigger = "mls"

[[snippets]]
name    = "mise ls interactive"
snippet = "{ _a=($(mise ls --current | fzf -m | awk '{print $1}')); [[ ${#_a[@]} -gt 0 ]] && mise ls \"${_a[@]}\"; unset _a; }"
trigger = "mlss"

[[snippets]]
name            = "mise run"
snippet         = "mise run"
trigger-pattern = "^mr$"

[[snippets]]
name    = "mise run --dry-run"
snippet = "mise run --dry-run"
trigger = "mrd"

[[snippets]]
name            = "mise tasks"
snippet         = "mise tasks --hidden"
trigger-pattern = "^mt$"

[[snippets]]
name            = "mise use"
snippet         = "mise use"
trigger-pattern = "^mu$"

[[snippets]]
name            = "mise uninstall interactive"
snippet         = "{ _a=($(mise ls --current | fzf -m | awk '{print $1}')); [[ ${#_a[@]} -gt 0 ]] && mise uninstall \"${_a[@]}\" --all; unset _a; }"
trigger-pattern = "^mui$"

[[snippets]]
name            = "mise upgrade"
snippet         = "mise upgrade --interactive --bump"
trigger-pattern = "^mup$"

[[snippets]]
name    = "mise use -g"
snippet = "mise use -g"
trigger = "mug"
