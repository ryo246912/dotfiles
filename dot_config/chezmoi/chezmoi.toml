pager = "delta"
[edit]
args    = ["--wait", "--new-window"]
command = "code"
[scriptEnv]
APPDATA = "/mnt/c/Users/r-ksk/AppData"
USERDIR = "/mnt/c/Users/r-ksk"
[bitwarden]
unlock = "auto"
[hooks.apply.post]
args = [
    "-c",
    """
mise_hash=$(cat "$HOME/.config/mise/config"*.toml 2>/dev/null | (command -v sha1sum >/dev/null && sha1sum || shasum -a 1))
if [ "$(cat /tmp/mise-config-hash 2>/dev/null)" != "$mise_hash" ]; then
  echo "Running mise install..."
  GITHUB_TOKEN=$(gh auth token 2>/dev/null || true) mise install --jobs=2 || exit 1
  echo "$mise_hash" > /tmp/mise-config-hash
fi
# bootstrap.packages は install とは別のマーカーで管理し、成功時のみ記録する。
# 自動実行は sudo 不要な macOS(brew bottle) のみ。Linux/WSL の apt は sudo を要し、
# 非対話フックでは認証できず失敗→毎回再試行になるため、ここでは実行せず
# 手動（setup.md の `mise bootstrap packages apply`）に委ねる。
if [ "$(uname)" = "Darwin" ] && [ "$(cat /tmp/mise-bootstrap-hash 2>/dev/null)" != "$mise_hash" ]; then
  if mise bootstrap packages apply --yes; then
    echo "$mise_hash" > /tmp/mise-bootstrap-hash
  else
    echo "warning: 'mise bootstrap packages apply' に失敗しました。次回 apply で再試行します（手動導入も可）"
  fi
fi
""",
]
command = "bash"
