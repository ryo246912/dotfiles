pager = "delta"
[edit]
args    = ["--wait", "--new-window"]
command = "code"
[scriptEnv]
APPDATA = "/mnt/c/Users/r-ksk/AppData"
USERDIR = "/mnt/c/Users/r-ksk"
[bitwarden]
unlock = "auto"
[hooks.apply.post]
args = [
    "-c",
    """
mise_hash=$(cat "$HOME/.config/mise/config"*.toml 2>/dev/null | (command -v sha1sum >/dev/null && sha1sum || shasum -a 1))
# 1) bootstrap.packages を先に導入する（install とは別のマーカーで管理し成功時のみ記録）。
#    bottle は sha256 検証で入る（gpg 不要）ため、gpg_verify=true の mise install より前に
#    gnupg を用意でき、gnupg を mise 管理のまま扱える。
#    自動実行は sudo 不要な macOS のみ（本 dotfiles は Apple Silicon 前提。Intel mac は非サポート）。
#    Linux/WSL(apt, 要 sudo) は非対話フックで失敗→再試行になるため手動（setup.md）に委ねる。
if [ "$(uname)" = "Darwin" ] && [ "$(cat /tmp/mise-bootstrap-hash 2>/dev/null)" != "$mise_hash" ]; then
  # brew: は config.mac.toml に隔離しているので、初回 apply（MISE_ENV 未設定）でも
  # 確実に読み込ませるため MISE_ENV=mac を明示する。
  if MISE_ENV=mac mise bootstrap packages apply --yes; then
    echo "$mise_hash" > /tmp/mise-bootstrap-hash
  else
    # bootstrap 失敗＝gnupg 等が未導入。gpg_verify=true の mise install が検証で失敗する
    # ため、degraded 実行を避けてここで中断する（再度 chezmoi apply で再試行）。
    echo "error: 'mise bootstrap packages apply' に失敗しました。gnupg 等が未導入のため中断します"
    exit 1
  fi
fi
# 2) mise install（gpg_verify は上の bootstrap で入れた gnupg を使う）
if [ "$(cat /tmp/mise-config-hash 2>/dev/null)" != "$mise_hash" ]; then
  # GITHUB_TOKEN 取得のため gh を最優先で導入する（github: バックエンドの rate limit 回避）。
  mise install --jobs=1 aqua:cli/cli || true
  # gh 未ログインだと token が空になり degraded install になる。先に
  # `gh auth login --scopes 'project'` を済ませる運用のため、未ログインなら案内して中断する。
  github_token=$(gh auth token 2>/dev/null || true)
  if [ -z "$github_token" ]; then
    echo "error: gh が未ログインです。'gh auth login --scopes project' を実行してから再度 chezmoi apply してください"
    exit 1
  fi
  echo "Running mise install..."
  GITHUB_TOKEN=$github_token mise install --jobs=2 || exit 1
  echo "$mise_hash" > /tmp/mise-config-hash
fi
""",
]
command = "bash"
