[settings]
auto_install = false
experimental = true

[task_config]
includes = ["tasks/*.toml"]

[tools]
"aqua:awslabs/git-secrets"       = "1.3.0"
"aqua:evilmartians/lefthook"     = "2.1.8"
"aqua:rhysd/actionlint"          = "1.7.12"
"aqua:secretlint/secretlint"     = "13.0.2"
"aqua:suzuki-shunsuke/ghalint"   = "1.5.6"
"aqua:suzuki-shunsuke/pinact"    = "3.10.1"
"aqua:tamasfe/taplo"             = "0.10.0"
"aqua:zizmorcore/zizmor"         = "1.25.2"
"github:betterleaks/betterleaks" = "1.3.1"
"github:oxc-project/oxc"         = { version = "1.66.0", version_prefix = "apps_v", asset_pattern = "oxfmt-*" }
"github:superfly/flyctl"         = "0.4.29"

[hooks]
enter = "lefthook install -f"
